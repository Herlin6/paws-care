name: paws_care
description: "Paws & Care - Platform pelaporan dan bantuan hewan jalanan"
publish_to: "none"
version: 0.1.0

environment:
  sdk: ^3.5.2

dependencies:
  flutter:
    sdk: flutter

  firebase_core: ^4.7.0
  firebase_auth: ^6.3.0
  cloud_firestore: ^6.3.0
  firebase_messaging: ^16.2.0

  google_sign_in: ^6.2.1

  flutter_local_notifications: ^19.5.0

  image_picker: ^1.1.2
  geolocator: ^14.0.2
  google_maps_flutter: ^2.17.1
  url_launcher: ^6.3.2

  intl: any
  http: ^1.6.0

  shared_preferences: ^2.5.5
  geocoding: ^4.0.0
  image_cropper: ^12.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logo.png"
  adaptive_icon_background: "#FFF8E7"
  adaptive_icon_foreground: "assets/images/logo.png"

flutter:
  uses-material-design: true

  assets:
    - assets/images/